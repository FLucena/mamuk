name: Content Checks

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]
  # Allow manual triggering
  workflow_dispatch:

jobs:
  content-checks:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run static content checks
      run: npm run check:page-content
      
    - name: Run component content tests
      run: npm run test:page-content
      
    - name: Generate content check report
      if: always()
      run: |
        echo "# Content Check Report" > content-check-report.md
        echo "## Static Content Checks" >> content-check-report.md
        echo "\`\`\`" >> content-check-report.md
        npm run check:page-content >> content-check-report.md || true
        echo "\`\`\`" >> content-check-report.md
        echo "## Component Tests" >> content-check-report.md
        echo "\`\`\`" >> content-check-report.md
        npm run test:page-content >> content-check-report.md || true
        echo "\`\`\`" >> content-check-report.md
    
    - name: Upload content check report
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: content-check-report
        path: content-check-report.md
        
    - name: Comment PR with content check results
      if: github.event_name == 'pull_request' && always()
      uses: actions/github-script@v7
      with:
        github-token: ${{ secrets.GITHUB_TOKEN }}
        script: |
          const fs = require('fs');
          const report = fs.readFileSync('content-check-report.md', 'utf8');
          const context = github.context;
          
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: report
          }); 